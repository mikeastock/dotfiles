# Herdr configuration managed by dotfiles.
# Goal: make Herdr feel close to this repo's tmux setup.
# Target: Herdr 0.7.x (herdr.dev)

onboarding = false

[theme]
name = "catppuccin"

[terminal]
# New panes/tabs/workspaces inherit the current pane/workspace directory.
new_cwd = "follow"

[keys]
# Match .tmux.conf: unbind C-b, use C-a as the prefix.
prefix = "ctrl+a"

# Session/workspace controls.
detach = "prefix+q"
workspace_picker = "prefix+w"
goto = "prefix+g"
new_workspace = "prefix+shift+n"
new_worktree = "prefix+shift+g"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"
previous_workspace = "shift+left"
next_workspace = "shift+right"

# Tmux-like windows as Herdr tabs.
new_tab = "prefix+c"
previous_tab = "prefix+p"
next_tab = "prefix+n"
switch_tab = "prefix+1..9"
rename_tab = "prefix+shift+t"
close_tab = "prefix+shift+x"

# Vim-style pane navigation and swap.
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
swap_pane_left = "prefix+shift+h"
swap_pane_down = "prefix+shift+j"
swap_pane_up = "prefix+shift+k"
swap_pane_right = "prefix+shift+l"
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
rename_pane = "prefix+shift+p"

# Splits: v for side-by-side, s for stacked, matching the custom tmux bindings.
# settings stays on comma so prefix+s can keep the horizontal split.
split_vertical = "prefix+v"
split_horizontal = "prefix+s"

close_pane = "prefix+x"
zoom = "prefix+z"
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"

help = "prefix+?"
settings = "prefix+comma"
reload_config = "prefix+shift+r"
open_notification_target = "prefix+o"
# 0.7.x split these: edit opens $EDITOR, copy_mode is keyboard selection.
edit_scrollback = "prefix+e"
copy_mode = "prefix+["

[ui]
# Leave mouse to the terminal so Cmd/Ctrl-click URLs keep working.
# Full-screen TUIs that request mouse reporting may still receive wheel events directly.
mouse_capture = false
mouse_scroll_lines = 6
confirm_close = true
prompt_new_tab_name = false
prompt_new_workspace_name = false
show_agent_labels_on_pane_borders = false
# Replaces the old agent_panel_scope key removed in recent Herdr.
agent_panel_sort = "spaces"
accent = "cyan"
sidebar_width = 26
sidebar_min_width = 18
sidebar_max_width = 36

[ui.toast]
delivery = "off"

[ui.sound]
enabled = false

[session]
# Resume supported agent panes into native conversations after server restart.
resume_agents_on_restore = true

[experimental]
allow_nested = false
kitty_graphics = true

[advanced]
# Approximate the generous tmux history-limit with a large byte-based scrollback.
scrollback_limit_bytes = 104857600
