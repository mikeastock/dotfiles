approval_policy = "on-request"
sandbox_mode = "danger-full-access"
model = "gpt-5.5"
model_reasoning_effort = "low"
model_catalog_json = "/home/mikeastock/.codex/model-catalog.json"

# Keep local CLI quiet about unstable features.
suppress_unstable_features_warning = true
service_tier = "fast"

[model_providers.fireworks]
name = "Fireworks"
base_url = "https://api.fireworks.ai/inference/v1"
env_key = "FIREWORKS_API_KEY"
wire_api = "responses"

[model_providers.baseten]
name = "Baseten"
base_url = "https://inference.baseten.co/v1"
env_key = "BASETEN_API_KEY"
wire_api = "responses"

[notice]
hide_rate_limit_model_nudge = true

[tui]
notifications = [ "agent-turn-complete" ]
status_line = ["model-with-reasoning", "current-dir", "project-name", "git-branch", "context-used"]
status_line_use_colors = true

[tui.keymap.composer]
# pi: app.message.followUp = alt+enter
# Codex default is tab.
queue = "alt-enter"

[tui.model_availability_nux]
"gpt-5.5" = 4

[features]
remote_connections = true
terminal_resize_reflow = true
memories = true
goals = true

[projects."/Users/mikeastock/code"]
trust_level = "trusted"

[projects."/data/workspace/code/buildr/app4"]
trust_level = "trusted"

[projects."/data/workspace/code/buildr/app2"]
trust_level = "trusted"

[projects."/data/workspace/code/buildr/app5"]
trust_level = "trusted"

[projects."/data/workspace/code/buildr/app3"]
trust_level = "trusted"

[projects."/data/workspace/code/oss/codex"]
trust_level = "trusted"
