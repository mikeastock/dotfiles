# plugins.toml - Plugin configuration for AI agent skills and extensions
#
# Each plugin is a table with fully qualified name (owner/repo):
#   url             - Git repository URL (required)
#   skills_path     - Glob pattern(s) to find skills (default: "skills/*")
#   skills_path_by_agent - Optional agent-specific skill paths, keyed by amp/claude/pi
#   skills          - List of skills to install: ["*"] for all, [] or omit for none
#   skills_skip_agents - Agents that should not receive this plugin's skills (optional)
#   skills_user_invocable_only - Skills that require explicit user invocation (optional)
#   extensions_path - Glob pattern(s) to find extensions (default: "extensions/*.ts")
#   extensions      - List of extensions to install: ["*"] for all, [] or omit for none
#   prompts_path    - Glob pattern(s) to find prompt templates (default: "prompts/*.md")
#   prompts         - List of prompt templates to install: ["*"] for all, [] or omit for none
#   subagents_path  - Glob pattern(s) to find subagent definitions (default: "agents/*.md")
#   subagents       - List of subagents to install: ["*"] for all, [] or omit for none
#   alias           - Optional prefix to prevent name collisions
#
# Pinned native dependencies live under [external_tools.<name>]. Their upstream
# installers run with an explicit version, destination, verification, and
# --no-configure so this repository remains the source of truth for agent config.
#
# Plugin directories use hyphen separator: owner/repo -> plugins/owner-repo/

[external_tools.dcg]
repo = "Dicklesworthstone/destructive_command_guard"
version = "v0.6.5"
installer_url = "https://raw.githubusercontent.com/Dicklesworthstone/destructive_command_guard/{version}/install.sh"

["anthropics/skills"]
url = "https://github.com/anthropics/skills"
skills = [ "frontend-design" ]

["kitlangton/skills"]
url = "https://github.com/kitlangton/skills"
skills = [ "effect" ]

["pbakaus/impeccable"]
url = "https://github.com/pbakaus/impeccable.git"
skills_path_by_agent = { amp = ".agents/skills/*", claude = ".claude/skills/*", pi = ".pi/skills/*" }
skills = [ "impeccable" ]

["mattpocock/skills"]
url = "https://github.com/mattpocock/skills"
skills_path = "skills/*/*" # Skills are grouped by category directories
skills = [ "prototype", "grill-with-docs", "teach", "writing-great-skills" ]

["steipete/agent-scripts"]
url = "https://github.com/steipete/agent-scripts"
skills = [ "create-cli" ]

["openprose/prose"]
url = "https://github.com/openprose/prose"
skills = [ "open-prose" ]

["shadcn/improve"]
url = "https://github.com/shadcn/improve"
skills = [ "improve" ]

["intercom/2x-skills"]
url = "https://github.com/intercom/2x-skills"
skills_path = "plugins/code-review-tools/skills/*"
skills = [ "thermo-nuclear-code-review" ]

["mitsuhiko/agent-stuff"]
url = "https://github.com/mitsuhiko/agent-stuff"
skills = [] # tmux is vendored under skills/ so it can diverge from the plugin version
extensions_path = "extensions/*.ts"
extensions = [ "context" ]

["rjs/shaping-skills"]
url = "https://github.com/rjs/shaping-skills.git"
skills_path = "*"                                                # Skills are at root level
skills = [ "shaping", "breadboarding", "breadboard-reflection" ]
skills_user_invocable_only = [ "shaping", "breadboarding", "breadboard-reflection" ]

["earendil-works/pi-review"]
url = "https://github.com/earendil-works/pi-review"
extensions_path = "."                                              # Extension file is at root level
extensions = [ "*" ]                                               # Install all extensions from this plugin
