[workspace]
members = [
  "crates/codex-apply-patch",
  "crates/codex-exec-server",
  "crates/codex-utils-absolute-path",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "Apache-2.0"
version = "0.0.0"

[workspace.dependencies]
anyhow = "1"
async-trait = "0.1"
dirs = "6"
dunce = "1"
schemars = "1"
serde = { version = "1", features = ["derive"] }
similar = "2"
thiserror = "2"
tokio = { version = "1", features = ["macros", "rt"] }
tree-sitter = "0.25"
tree-sitter-bash = "0.25"
ts-rs = { version = "11", features = ["serde-json-impl", "no-serde-warnings"] }
