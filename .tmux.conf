# improve colors
set -g default-terminal "tmux-256color"

# Enable terminal features Amp and modern TUIs rely on
set -g terminal-features "xterm*:clipboard:ccolour:cstyle:focus:title:RGB:extkeys:sync:hyperlinks,screen*:title,rxvt*:ignorefkeys"

# Allow programs to pass through terminal escape sequences
set -g allow-passthrough all

# act like vim
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

# act like GNU screen
unbind C-b
set -g prefix C-a
bind-key C-a send-prefix

# Allows for faster key repetition
set -s escape-time 0
setw -g aggressive-resize on
set -g mouse off
set -g extended-keys on
set -g extended-keys-format csi-u
bind-key -n S-Enter send-keys Escape "[13;2u"

# start window numbers at 1 to match keyboard order with tmux window order
set -g base-index 1
set-window-option -g pane-base-index 1
set-window-option -g automatic-rename off

# increase scrollback lines
set -g history-limit 100000

# vim's definition of a horizontal/vertical split is reversed from tmux's
bind-key s split-window -v -c '#{pane_current_path}'
bind-key v split-window -h -c '#{pane_current_path}'

# new panes/windows inherit the current pane's directory
bind-key '"' split-window -v -c '#{pane_current_path}'
bind-key % split-window -h -c '#{pane_current_path}'
bind-key c new-window -a -c '#{pane_current_path}'

# resize panes like vim
bind-key -r < resize-pane -L 3
bind-key -r > resize-pane -R 3
bind-key -r + resize-pane -U 1
bind-key -r = resize-pane -D 1

# Setup copy mode to behave more like Vim and copy to the system clipboard
set -g set-clipboard on
# Mosh only reliably forwards OSC 52 clipboard writes that target the clipboard
# selector (`c`). Force tmux's clipboard capability to emit that form.
set -ag terminal-overrides ",*:Ms=\E]52;c;%p2%s\007"
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "$HOME/.local/bin/clipboard-copy"
bind-key -T copy-mode-vi Enter send -X copy-pipe-and-cancel "$HOME/.local/bin/clipboard-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "$HOME/.local/bin/clipboard-copy"

# shift arrow keys to switch windows
bind-key -n S-Left select-window -t :-
bind-key -n S-Right select-window -t :+

# Allow proper ssh agent forwarding when reattaching
if-shell 'test "$SSH_CONNECTION"' "set -g update-environment 'DISPLAY WINDOWID XAUTHORITY'"
if-shell 'test "$SSH_CONNECTION"' "set-environment -g 'SSH_AUTH_SOCK' ~/.ssh/ssh_auth_sock"

# Status Bar
set -g status-style 'bg=#434c5e,fg=#d8dee9'
set -g status-left ''
set -g status-left-length 0
set -g window-status-style 'bg=#434c5e,fg=#8f97aa'
set -g window-status-current-style 'bg=#4c566a,fg=#eceff4,bold'
set -g window-status-activity-style 'bg=#434c5e,fg=#d8dee9'
set -g window-status-separator ' '
set -g window-status-format ' #W '
set -g window-status-current-format '[#W]'
set -g status-interval 2
set -g status-right "#[fg=#81a1c1][#S] #[fg=#d8dee9]:: #[fg=#d8dee9]#($HOME/.local/bin/tmux-status-load | awk '{print $1\" :: \"$2}') #[fg=#d8dee9]:: #[fg=#ebcb8b]%d %b %Y #[fg=#d8dee9]:: #[fg=#b48ead]%l:%M %p #[fg=#d8dee9]:: #[fg=#a3be8c]#(date -u | awk '{print $4}') #[fg=#d8dee9]"
set -g status-right-length 140

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'

# Keep this line at the very bottom of tmux.conf
if-shell 'test -x ~/.tmux/plugins/tpm/tpm' "run '~/.tmux/plugins/tpm/tpm'"
